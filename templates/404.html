{% extends "base.html" %}
{% block title %}404 - Not Found{% endblock %}
{% block content %}
<div style="text-align: center; padding: 4rem 2rem;">
    <i class="bi bi-search" style="font-size: 5rem; color: var(--warning); margin-bottom: 1rem;"></i>
    <h1 style="color: white; font-size: 2.5rem; margin-bottom: 1rem;">404 - Page Not Found</h1>
    <p style="color: rgba(255,255,255,0.9); margin-bottom: 2rem;">The page you're looking for doesn't exist.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg">
        <i class="bi bi-house"></i> Go Home
    </a>
</div>
{% endblock %}
