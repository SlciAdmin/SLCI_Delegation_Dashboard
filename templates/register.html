{% extends "base.html" %}
{% block title %}Register - SLCI{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 3rem auto;">
    <div class="card">
        <div class="card-header">
            <i class="bi bi-person-plus"></i> Register
        </div>
        <div class="card-body">
            <form method="POST">
                <div class="form-group">
                    <label class="form-label">Full Name *</label>
                    <input type="text" class="form-control" name="name" required placeholder="John Doe">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Email *</label>
                    <input type="email" class="form-control" name="email" required placeholder="your@email.com">
                </div>

                <!-- Add this inside the form, after Email field -->
              <div class="form-group">
                <label class="form-label">Phone Number (with Country Code) *</label>
                <input type="text" class="form-control" name="phone" required placeholder="e.g., 919876543210" pattern="[0-9]{10,15}">
                <small style="color: var(--gray);">Enter without + or spaces (e.g., 919876543210)</small>
              </div>
                
                <div class="form-group">
                    <label class="form-label">Password *</label>
                    <input type="password" class="form-control" name="password" minlength="6" required placeholder="Min 6 characters">
                </div>

            
                
                <div class="form-group">
                    <label class="form-label">Designation</label>
                    <input type="text" class="form-control" name="designation" placeholder="Software Engineer">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Role *</label>
                    <select class="form-control" name="role">
                        <option value="employee">Employee</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="bi bi-person-plus"></i> Create Account
                </button>
            </form>
            
            <p style="text-align: center; margin-top: 1.5rem; color: var(--gray);">
                Have account? <a href="{{ url_for('login') }}" style="color: var(--primary);">Login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
