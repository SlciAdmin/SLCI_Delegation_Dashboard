{% extends "base.html" %}
{% block title %}Create Task{% endblock %}

{% block content %}
<div class="container" style="max-width: 900px; margin: 2rem auto;">
    <div class="card">
        <div class="card-header">
            <i class="bi bi-plus-circle"></i> Create New Task
        </div>
        <div class="card-body">
            <form method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label class="form-label">Task Title *</label>
                    <input type="text" class="form-control" name="title" required placeholder="Enter task title">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Assign To Employee *</label>
                    <select class="form-control" name="employee_id" required>
                        <option value="">Select Employee...</option>
                        {% for emp in employees %}
                        <option value="{{ emp.id }}">{{ emp.name }} ({{ emp.designation }})</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" name="description" rows="4" placeholder="Task details..."></textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Deadline *</label>
                    <input type="datetime-local" class="form-control" name="deadline" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Priority</label>
                    <select class="form-control" name="priority">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Attach Document (Optional)</label>
                    <input type="file" class="form-control" name="admin_attachment">
                </div>
                
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">
                        <i class="bi bi-check-circle"></i> Create Task
                    </button>
                    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline" style="flex: 1;">
                        <i class="bi bi-x-circle"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
