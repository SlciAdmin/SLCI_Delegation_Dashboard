{% extends "base.html" %}
{% block title %}Login - SLCI{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 3rem auto;">
    <div class="card">
        <div class="card-header">
            <i class="bi bi-box-arrow-in-right"></i> Login
        </div>
        <div class="card-body">
            <form method="POST">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" name="email" required placeholder="your@email.com">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" required placeholder="Enter password">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="bi bi-box-arrow-in-right"></i> Sign In
                </button>
            </form>
            
            <p style="text-align: center; margin-top: 1.5rem; color: var(--gray);">
                No account? <a href="{{ url_for('register') }}" style="color: var(--primary);">Register</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
